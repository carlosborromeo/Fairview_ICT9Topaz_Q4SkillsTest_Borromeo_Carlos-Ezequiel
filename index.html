<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>U.A. Hero Portal - Login</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Google+Sans:ital,opsz,wght@0,17..18,400..700;1,17..18,400..700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Google Sans', sans-serif;
            background: radial-gradient(circle at top, #000000 0%, #002c8b 25%, #cc0003 60%, #FFE500 100%);
            min-height: 100vh;
            color: #f5f5f5;
            display: flex;
            flex-direction: column;
        }

        .login-container {
            max-width: 450px;
            margin: 100px auto;
            padding: 40px;
            background: rgba(0, 0, 0, 0.9);
            border: 3px solid #FFE500;
            border-radius: 20px;
            box-shadow: 0 0 30px rgba(255, 229, 0, 0.3);
            position: relative;
            overflow: hidden;
        }

        .login-container::after {
            content: 'U.A.';
            position: absolute;
            top: 10px;
            right: 15px;
            font-size: 1.2rem;
            font-weight: bold;
            color: #FFE500;
            opacity: 0.5;
        }

        .navbar {
            background: rgba(0, 0, 0, 0.95);
            border-bottom: 3px solid #FFE500;
            padding: 15px 30px;
        }

        .navbar-title {
            color: #FFE500;
            font-weight: bold;
            text-shadow: 0 0 10px #FFE500;
            font-size: 1.4rem;
        }

        .ua-logo-nav {
            width: 40px;
            height: 40px;
            background: white;
            border-radius: 50%;
            border: 2px solid #FFE500;
            margin-right: 10px;
        }

        .form-control {
            background: rgba(255, 255, 255, 0.1);
            border: 2px solid #FFE500;
            color: white;
            border-radius: 10px;
            padding: 12px;
        }

        .form-control:focus {
            background: rgba(255, 255, 255, 0.15);
            color: white;
            border-color: #cc0003;
            box-shadow: 0 0 15px #cc0003;
        }

        .btn-login {
            background: linear-gradient(135deg, #002c8b 0%, #cc0003 100%);
            border: 2px solid #FFE500;
            color: white;
            font-weight: bold;
            padding: 12px;
            border-radius: 10px;
            transition: all 0.3s;
        }

        .btn-login:hover {
            transform: scale(1.02);
            box-shadow: 0 0 20px #FFE500;
            color: #FFE500;
        }

        .instruction-box {
            background: rgba(0, 44, 139, 0.4);
            border-left: 4px solid #FFE500;
            padding: 15px;
            margin-bottom: 20px;
            font-size: 0.9rem;
        }

        footer {
            margin-top: auto;
            background: rgba(0, 0, 0, 0.9);
            border-top: 3px solid #cc0003;
            padding: 20px;
            text-align: center;
        }

        a { color: #FFE500; text-decoration: none; }
        a:hover { color: #cc0003; }
    </style>
</head>
<body>
        <!-- DISCLAIMER: 
            sir, I did not use any AI in making this. I am using knowledge from hours of tutorials by w3Schools, Bro Code (my favorite coding youtuber (https://youtu.be/lfmg-EJ8gm4, https://www.youtube.com/watch?v=HGTJBPNC-Gw) (i didn't finish the whole video but i skipped to the parts that are relevant to the activity)), and knowledge that i got from online forums talking about how to do xyz.
        -->

    <header class="navbar d-flex align-items-center justify-content-between">
        <div class="d-flex align-items-center">
            <img src="https://static.wikia.nocookie.net/five-world-war/images/3/30/Ua.jpg/revision/latest?cb=20190303163122" alt="U.A. Logo" class="ua-logo-nav">
            <div class="navbar-title">U.A. Hero Portal</div>
        </div>
        <nav>
            <a href="#" class="me-3">Home</a>
            <a href="https://myheroacademia.fandom.com/wiki/U.A._High_School" target="_blank">About U.A.</a>
        </nav>
    </header>

    <div class="container">
        <div class="login-container">
            <h2 class="text-center mb-4" style="color: #FFE500; text-shadow: 0 0 10px #000;">STUDENT LOGIN</h2>
            
            <div class="text-center mb-3"> <!-- this is really cool it shows "Show Admin Access Key the first time and after you click it i used JS to make it say Show Access Key and Hide Access Key"-->
                <button id="toggleInstructions" class="btn btn-outline-warning btn-sm" onclick="toggleInstructions()">
                    Show Admin Access Key
                </button>
            </div>
            
            <div id="instructions" class="instruction-box" style="display: none;">
                <strong>Hero ID:</strong> admin <br>
                <strong>Passkey:</strong> password123
            </div>
            
            <form id="loginForm" onsubmit="validateLogin(event)">
                <div class="mb-3">
                    <label for="username" class="form-label">Hero Name / Student ID</label>
                    <input type="text" class="form-control" id="username" placeholder="Enter hero name" required>
                </div>
                <div class="mb-3">
                    <label for="password" class="form-label">Security Password</label>
                    <input type="password" class="form-control" id="password" placeholder="Enter password" required>
                </div>
                
                <div class="mb-3 d-flex justify-content-between">
                    <div class="form-check">
                        <input type="checkbox" class="form-check-input" id="showPassword" onchange="togglePasswordVisibility()">
                        <label class="form-check-label small" for="showPassword">Show password</label>
                    </div>
                    <div class="form-check">
                        <input type="checkbox" id="checkRememberMe" class="form-check-input" onchange="showRemember()">
                        <label class="form-check-label small" for="checkRememberMe">Remember Me</label>
                    </div>
                </div>

                <div id="rememberMe" class="small text-warning mb-3"></div>
                
                <button type="submit" class="btn btn-login w-100">GO BEYOND!</button>
            </form>
            
            <div id="output" class="mt-3 text-center"></div>
            
            <p class="mt-4 text-center small">
                <a href="https://myheroacademia.fandom.com/wiki/Chiyo_Shuzenji">Forgot hero credentials? Contact Recovery Girl.</a>
            </p>
        </div>
    </div>

        <footer>
            <div class="container">
                <p>© 2026 U.A. High School - Hero Course. Go beyond, PLUS ULTRA!</p>
                <p>
                    <a href="https://myheroacademia.fandom.com/wiki/U.A._High_School" target="_blank">My Hero Academia Wiki: U.A. High</a>
                </p>
            </div>
        </footer>

    <script>
    // 99% of the stuff here is the stuff we learned in class, i just added some extra touches to make it cooler

        let correctUsername = "admin";
        let correctPassword = "password123";
        let instructionsVisible = false;

        // toggle the visibility of the instructions using an if else statement
        function toggleInstructions() {
            let instructionsDiv = document.getElementById("instructions");
            if (!instructionsVisible) {
                instructionsDiv.style.display = "block";
                document.getElementById("toggleInstructions").innerText = "Hide Access Key";
                instructionsVisible = true;
            } else {
                instructionsDiv.style.display = "none";
                document.getElementById("toggleInstructions").innerText = "Show Access Key";
                instructionsVisible = false;
            }
        }

        // toggles password visibility using super basic if else statement
        function togglePasswordVisibility() {
            let passwordField = document.getElementById("password");
            if (passwordField.type === "password") {
                passwordField.type = "text";
            } else {
                passwordField.type = "password";
            }
        }

        function showRemember() {
            let checkBox = document.getElementById("checkRememberMe").checked;
            const textContainer = document.getElementById("rememberMe");
            // when checkbox is checked, it reads as true

            switch(checkBox) {
                case true:
                    textContainer.innerHTML = "Login details saved.";
                break;

                case false:
                    textContainer.innerHTML = "";
                break;
                // default not needed cause its a boolean
            }
        }

        // the actual log in
        function validateLogin(event) {
            event.preventDefault(); // stops from reloading page i hate when it does that
            let username = document.getElementById("username").value;
            let password = document.getElementById("password").value;
            let outputDiv = document.getElementById("output");

            if (username === correctUsername && password === correctPassword) { // sir this thing took me almost an hour because i did not know what setTimeout was
                outputDiv.innerHTML = "<span class='text-success'>Authentication successful! Welcome, admin...</span>";
                // redirect to the notebooks yay
                setTimeout(() => {
                    window.location.href = "notebooks.html"; 
                }, 1000);
            } else {
                outputDiv.innerHTML = "<span class='text-danger'>Invalid Hero Credentials. Try again!</span>";
            }
        }
    </script>
</body>
</html>
